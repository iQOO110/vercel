<!DOCTYPE html>
<html lang="zh-CN" class="android mobile portrait">
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <title>山东管理学院教务系统</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- 样式表 -->
    <link rel="stylesheet" type="text/css" href="https://jwxt.sdmu.edu.cn/zftal-ui-v5-1.0.2/assets/plugins/bootstrap/css/bootstrap.min.css?ver=29742790">
    <link rel="stylesheet" type="text/css" href="https://jwxt.sdmu.edu.cn/jwglxt/css/jw-login.css?ver=29742790">
    
    <style>
    .copyright-footer {
        margin-top: 20px;
        padding: 20px 15px;
        color: #666;
        font-size: 14px;
        text-align: center;
    }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/jquery@3.6.4/dist/jquery.min.js"></script>
    <script>
    $(function(){
        window.login = function() {
            let username = $("#yhm").val().trim();
            let pwd = $("#mm").val().trim();
            let code = $("#yzm").val().trim();
            if (!username || !pwd || !code) {
                $("#tips").text("请填写用户名、密码、验证码").show();
                return;
            }
            window.location.href = "index2.html";
        };

        $("#yzmPic").click(function(){
            let time = new Date().getTime();
            $(this).attr("src", "https://jwxt.sdmu.edu.cn/jwglxt/kaptcha?time=" + time);
        });
    });
    </script>
</head>
<body style="background: rgb(250, 250, 250);">
    <div class="container container_1170">
        <div class="row sl_log_top">
            <div class="col-sm-8 logo_1">
                <img src="https://jwxt.sdmu.edu.cn/zftal-ui-v5-1.0.2/assets/images/logo/logo_jw_d.png" style="margin-top:-3px">
                <span id="xtmc">山东管理学院教务系统</span>
            </div>
        </div>
        <div class="row sl_log_bor4">
            <div class="col-sm-8 hidden-xs sl_log_lf slideShow">
                <img class="img-responsive" src="https://jwxt.sdmu.edu.cn/jwglxt/xtgl/dlycssz_cxDlycsszZp.html?zplx=3">
            </div>
            <div class="col-sm-4 sl_log_rt">
                <form class="form-horizontal" role="form">
                    <div class="tab-content">
                        <div id="home" class="tab-pane in active">
                            <h5>用户登录</h5>
                            <p style="display: none;" id="tips" class="bg_danger sl_danger"></p>
                            
                            <div class="form-group">
                                <div class="input-group">
                                    <div class="input-group-addon"><img src="https://jwxt.sdmu.edu.cn/zftal-ui-v5-1.0.2/assets/images/log_ic01.png" width="16" height="16"></div>
                                    <input type="text" class="form-control" id="yhm" placeholder="用户名">
                                </div>
                            </div>
                            <div class="form-group">
                                <div class="input-group">
                                    <div class="input-group-addon"><img src="https://jwxt.sdmu.edu.cn/zftal-ui-v5-1.0.2/assets/images/log_ic02.png" width="16" height="16"></div>
                                    <input type="password" class="form-control" id="mm" placeholder="密码">
                                </div>
                            </div>
                            <div class="form-group">
                                <div class="input-group col-xs-4 pull-left">
                                    <input type="text" class="form-control" id="yzm" placeholder="验证码">
                                </div>
                                <div class="input-group col-xs-4 col-xs-offset-5">
                                    <img id="yzmPic" style="cursor:pointer;" width="108" height="34" src="https://jwxt.sdmu.edu.cn/jwglxt/kaptcha?time=1">
                                </div>
                            </div>
                            <div class="form-group">
                                <button type="button" class="btn btn-primary btn-block" onclick="login()">登 录</button>
                            </div>
                            <div class="alert alert-danger" role="alert">
                                用户名：学号 /工号<br>
                                初始密码：身份证号后六位@sdmu<br>
                                如忘记密码，请联系所在院部教学秘书或学工办重置密码<br>
                                首选谷歌浏览器，360浏览器用极速模式
                            </div>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <div class="copyright-footer">
        <p>版权所有© Copyright 1999-2025 正方软件股份有限公司</p>
        <p>中国·杭州西湖区三墩镇数治路99号901室 版本V-9.0</p>
    </div>
</body>
</html>
