<script>
// 登录按钮点击事件：校验后跳转index2.html
function login() {
    let username = $("#yhm").val().trim();
    let pwd = $("#mm").val().trim();
    let code = $("#yzm").val().trim();
    // 空值校验
    if (!username || !pwd || !code) {
        $("#tips").text("请填写完整用户名、密码、验证码").show();
        return;
    }
    // 同目录跳转首页index2.html
    window.location.href = "index2.html";
}
// 点击验证码刷新
$("#yzmPic").click(function(){
    let time = new Date().getTime();
    $(this).attr("src","https://jwxt.sdmu.edu.cn/jwglxt/kaptcha?time="+time);
})
</script>
